<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cool · To-Do</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #38bdf8;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --done: #475569;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      padding: 3rem 1rem;
    }

    .app {
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border-radius: 16px;
      padding: 1.75rem;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 0.25rem;
      font-size: 1.6rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0 0 1.5rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.7rem 0.9rem;
      border: 1px solid #334155;
      border-radius: 10px;
      background: #0f172a;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s ease;
    }

    input[type="text"]:focus { border-color: var(--accent); }

    button {
      border: none;
      cursor: pointer;
      font-size: 1rem;
      border-radius: 10px;
    }

    .add-btn {
      padding: 0 1.1rem;
      background: var(--accent);
      color: #0f172a;
      font-weight: 600;
    }

    .add-btn:hover { filter: brightness(1.08); }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    li {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 0.85rem;
      background: #0f172a;
      border-radius: 10px;
      border: 1px solid #1e293b;
    }

    li .check {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      accent-color: var(--accent);
      cursor: pointer;
    }

    li .label {
      flex: 1;
      word-break: break-word;
    }

    li.done .label {
      color: var(--done);
      text-decoration: line-through;
    }

    .delete {
      background: transparent;
      color: var(--muted);
      font-size: 1.2rem;
      line-height: 1;
      padding: 0.2rem 0.4rem;
    }

    .delete:hover { color: #f87171; }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 1.5rem 0;
      font-size: 0.9rem;
    }

    footer {
      margin-top: 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .clear-btn {
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      padding: 0.3rem 0.5rem;
    }

    .clear-btn:hover { color: #f87171; }
  </style>
</head>
<body>
  <main class="app">
    <h1>Cool To-Do</h1>
    <p class="subtitle">A tiny, dependency-free task list. Saved in your browser.</p>

    <form id="new-task-form">
      <input
        type="text"
        id="new-task"
        placeholder="What needs doing?"
        autocomplete="off"
        maxlength="200"
      />
      <button type="submit" class="add-btn">Add</button>
    </form>

    <ul id="task-list"></ul>

    <footer>
      <span id="count">0 tasks</span>
      <button id="clear-done" class="clear-btn">Clear completed</button>
    </footer>
  </main>

  <script>
    const STORAGE_KEY = "cool-todo.tasks";

    const form = document.getElementById("new-task-form");
    const input = document.getElementById("new-task");
    const list = document.getElementById("task-list");
    const count = document.getElementById("count");
    const clearDone = document.getElementById("clear-done");

    /** @type {{id: number, text: string, done: boolean}[]} */
    let tasks = load();

    function load() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function render() {
      list.innerHTML = "";

      if (tasks.length === 0) {
        const empty = document.createElement("p");
        empty.className = "empty";
        empty.textContent = "Nothing here yet — add your first task above.";
        list.appendChild(empty);
      }

      for (const task of tasks) {
        const li = document.createElement("li");
        if (task.done) li.classList.add("done");

        const check = document.createElement("input");
        check.type = "checkbox";
        check.className = "check";
        check.checked = task.done;
        check.addEventListener("change", () => toggle(task.id));

        const label = document.createElement("span");
        label.className = "label";
        label.textContent = task.text;

        const del = document.createElement("button");
        del.className = "delete";
        del.setAttribute("aria-label", "Delete task");
        del.textContent = "×";
        del.addEventListener("click", () => remove(task.id));

        li.append(check, label, del);
        list.appendChild(li);
      }

      const remaining = tasks.filter((t) => !t.done).length;
      count.textContent = `${remaining} of ${tasks.length} left`;
    }

    function addTask(text) {
      tasks.push({ id: Date.now(), text, done: false });
      save();
      render();
    }

    function toggle(id) {
      const task = tasks.find((t) => t.id === id);
      if (task) task.done = !task.done;
      save();
      render();
    }

    function remove(id) {
      tasks = tasks.filter((t) => t.id !== id);
      save();
      render();
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      addTask(text);
      input.value = "";
      input.focus();
    });

    clearDone.addEventListener("click", () => {
      tasks = tasks.filter((t) => !t.done);
      save();
      render();
    });

    render();
  </script>
</body>
</html>
